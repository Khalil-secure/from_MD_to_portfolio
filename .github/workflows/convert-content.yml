name: Auto-convert CONTENT.md to JSON

on:
  push:
    paths:
      - 'CONTENT.md'
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout, convert, and push
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" repo
          cd repo
          git checkout ${{ github.ref_name }}
          node convert.js
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add content.json
            git commit -m "🤖 Auto: Update content.json from CONTENT.md"
            git push
          fi
